<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>استعلام الأعضاء</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    direction: rtl;
}
input {
    padding: 10px;
    width: 200px;
}
button {
    padding: 10px;
}
</style>
</head>

<body>

<h2>أدخل رقم العضوية</h2>

<input type="text" id="searchInput">
<button onclick="search()">بحث</button>

<div id="result"></div>

<script>

const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";

async function search() {
    let id = document.getElementById("searchInput").value;
    let res = await fetch(url);
    let data = await res.json();

    let found = data.find(item => item.membership_id == id);

    if(found){
        document.getElementById("result").innerHTML = `
            الاسم: ${found.name} <br>
            الإجمالي: ${found.total} <br>
            المدفوع: ${found.paid} <br>
            المتبقي: ${found.remaining}
        `;
    } else {
        document.getElementById("result").innerHTML = "❌ لا يوجد";
    }
}

</script>

</body>
</html>

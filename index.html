<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الجمعية الشعبية</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fa;
      direction: rtl;
      text-align: center;
      font-family: Arial;
    }

    .card {
      border-radius: 15px;
    }

    h2 {
      color: #0d6efd;
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <h2 class="mb-4">🔍 البحث عن عضو</h2>

  <div class="input-group mb-3">
    <input type="number" id="searchInput" class="form-control" placeholder="ادخل رقم العضوية">
    <button class="btn btn-primary" onclick="searchMember()">بحث</button>
  </div>

  <div id="result" class="card p-3 shadow" style="display:none;">
    <h4 id="name"></h4>
    <p>💰 الإجمالي: <span id="total"></span></p>
    <p>💵 المدفوع: <span id="paid"></span></p>
    <p>📉 المتبقي: <span id="remaining"></span></p>
  </div>

  <div id="notfound" class="alert alert-danger mt-3" style="display:none;">
    ❌ لم يتم العثور على العضو
  </div>

</div>

<script>
async function searchMember() {
  const id = document.getElementById("searchInput").value;

  if (!id) return;

  const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";

  const response = await fetch(url);
  const data = await response.json();

  const member = data.find(item => item.membership_id === id);

  if (member) {
    document.getElementById("result").style.display = "block";
    document.getElementById("notfound").style.display = "none";

    document.getElementById("name").innerText = "👤 " + member.name;
    document.getElementById("total").innerText = member.total;
    document.getElementById("paid").innerText = member.paid;
    document.getElementById("remaining").innerText = member.remaining;
  } else {
    document.getElementById("result").style.display = "none";
    document.getElementById("notfound").style.display = "block";
  }
}
</script>

</body>
</html>

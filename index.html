<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الأعضاء</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.container { margin-top: 100px; }

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    margin: auto;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

.login { background: #4CAF50; color: white; }
.logout { background: red; color: white; }
.whatsapp { background: #25D366; color: white; }

.member {
    background: #fff;
    color: black;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔐 تسجيل الدخول</h2>

<div id="loginBox" class="card">
<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">
<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="result"></div>

</div>

<script>

let members = [];

// تحميل البيانات من الشيت
async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// تسجيل الدخول
function login() {
    const id = document.getElementById("id").value;
    const pass = document.getElementById("pass").value;

    // 👑 ADMIN
    if(id == "9999" && pass == "admin123"){
        showAdmin();
        return;
    }

    // 👤 MEMBER
    const user = members.find(m =>
        m.membership_id == id && m.password == pass
    );

    if(user){
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ خطأ";
    }
}

// عرض عضو
function showUser(user){
    document.getElementById("loginBox").style.display = "none";

    document.getElementById("result").innerHTML = `
    <div class="card">
        <h3>👤 ${user.name}</h3>
        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <a target="_blank" href="https://wa.me/963980049054?text=مرحبا أنا العضو ${user.membership_id}">
        <button class="whatsapp">📱 واتساب</button>
        </a>

        <button class="logout" onclick="location.reload()">🚪 خروج</button>
    </div>
    `;
}

// عرض الأدمن
function showAdmin(){
    document.getElementById("loginBox").style.display = "none";

    let html = `
    <div class="card">
        <h3>👑 لوحة التحكم</h3>
        <input id="search" placeholder="بحث..." onkeyup="searchAdmin()">
        <button class="logout" onclick="location.reload()">🚪 خروج</button>
    </div>
    <div id="adminList"></div>
    `;

    document.getElementById("result").innerHTML = html;

    showAll(members);
}

// عرض كل الأعضاء
function showAll(list){
    let html = "";

    list.forEach(m => {
        let remaining = m.total - m.paid;

        html += `
        <div class="member">
            <h4>${m.name}</h4>
            <p>ID: ${m.membership_id}</p>
            <p>Total: ${m.total}</p>
            <p>Paid: ${m.paid}</p>
            <p>Remaining: ${remaining}</p>

            <button onclick="copyData('${m.name}', '${m.membership_id}', '${m.total}', '${m.paid}', '${remaining}')">📋 نسخ</button>

            <button onclick="downloadPDF('${m.membership_id}')">📄 PDF</button>

            <a target="_blank" href="https://wa.me/963980049054?text=العضو ${m.membership_id}">
            <button class="whatsapp">📱 واتساب</button>
            </a>
        </div>
        `;
    });

    document.getElementById("adminList").innerHTML = html;
}

// بحث الأدمن
function searchAdmin(){
    let value = document.getElementById("search").value.toLowerCase();

    let filtered = members.filter(m =>
        m.name.toLowerCase().includes(value)
    );

    showAll(filtered);
}

// نسخ
function copyData(name, id, total, paid, remaining){
    let text = `Name: ${name} ID: ${id} Total: ${total} Paid: ${paid} Remaining: ${remaining}`;
    navigator.clipboard.writeText(text);
    alert("تم النسخ ✅");
}

// PDF
function downloadPDF(id){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let m = members.find(x => x.membership_id == id);
    let remaining = m.total - m.paid;

    doc.text("Member Info", 10, 10);
    doc.text("Name: " + m.name, 10, 20);
    doc.text("ID: " + m.membership_id, 10, 30);
    doc.text("Total: " + m.total, 10, 40);
    doc.text("Paid: " + m.paid, 10, 50);
    doc.text("Remaining: " + remaining, 10, 60);

    doc.save("member_" + id + ".pdf");
}

</script>

</body>
</html>

<script>

let lastUpdate = localStorage.getItem("lastUpdate") || "غير محدد";

// ✅ رابط السيرفر (Google Script)
const API_URL = "https://script.google.com/macros/s/AKfycbwPT3HpCK9ucjnkgGZJefJ-sTZSi4YaGeOVi26P_EB3ZjJorA-QVMf7LtvFCDlBirvYIQ/exec";

// 🔐 تسجيل الدخول (من السيرفر مباشرة)
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    if(id == "9999" && pass == "admin123"){
        updateDate();
        showAdmin(true);
        return;
    }

    fetch(`${API_URL}?id=${id}&password=${pass}`)
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            showUser({
                membership_id: id,
                name: data.name,
                total: data.total,
                paid: data.paid,
                remaining: data.remaining
            });
        } else {
            document.getElementById("error").innerText = "❌ بيانات خاطئة";
        }
    });
}

// 👤 عرض العضو (نفس تصميمك)
function showUser(user){
    document.getElementById("loginBox").style.display="none";

    document.getElementById("content").innerHTML = `
    <div class="card">

        <div class="alert">🔔 تم تحميل البيانات من السيرفر</div>

        <h3>${user.name}</h3>

        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <p>📅 آخر تحديث: ${lastUpdate}</p>

        <hr>

        <h4>🔑 تغيير كلمة السر</h4>
        <input id="newPass" type="password" placeholder="كلمة السر الجديدة">
        <button class="admin" onclick="changePassword('${user.membership_id}')">حفظ</button>

        <p id="msg"></p>

        <button class="whatsapp" onclick="openWA()">
        للتواصل مع الجمعية اضغط هنا
        </button>

        <button class="logout" onclick="location.reload()">خروج</button>
    </div>
    `;
}

// 🔐 تغيير كلمة السر (فوري)
function changePassword(userId){
    let newPass = document.getElementById("newPass").value;

    if(!newPass){
        document.getElementById("msg").innerText = "❌ اكتب كلمة السر";
        return;
    }

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            id: userId,
            password: newPass
        })
    })
    .then(res => res.text())
    .then(response => {
        if(response === "success"){
            document.getElementById("msg").innerText = "✅ تم تغيير كلمة السر";
            
            // 🔥 تحديث فوري
            setTimeout(()=> location.reload(), 1000);

        } else {
            document.getElementById("msg").innerText = "❌ فشل التغيير";
        }
    });
}

// 👑 الأدمن (نفسه بدون تعديل)
function showAdmin(showAlert=false){
    document.getElementById("loginBox").style.display="none";

    let alertBox = showAlert ? `<div class="alert">🔔 تم تحديث التاريخ</div>` : "";

    let html = `<div class="card">
    ${alertBox}
    <h3>👑 لوحة التحكم</h3>

    <p>📅 آخر تحديث: ${lastUpdate}</p>

    <p>⚠️ البيانات الآن من السيرفر مباشرة</p>

    <button class="logout" onclick="location.reload()">خروج</button>
    </div>`;

    document.getElementById("content").innerHTML = html;
}

// 📱 واتساب
function openWA(){
    window.open("https://wa.me/963980049054", "_blank");
}

// 🔗 روابط
function openLink(url){
    window.open(url, "_blank");
}

// 📅 تحديث التاريخ
function updateDate(){
    let now = new Date().toLocaleString();
    localStorage.setItem("lastUpdate", now);
    lastUpdate = now;
}

</script>

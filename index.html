<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الأعضاء</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.container {
    margin-top: 120px;
}

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 350px;
    margin: auto;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

.login-btn {
    background: #4CAF50;
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.logout {
    background: red;
    color: white;
}

.result {
    margin-top: 60px;
}
</style>

</head>

<body>

<div class="container">

<h2>🔐 تسجيل دخول العضو</h2>

<div id="loginBox" class="card">
    <input type="text" id="id" placeholder="رقم العضوية">
    <input type="password" id="pass" placeholder="كلمة السر">
    <button class="login-btn" onclick="login()">دخول</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="result" class="card result" style="display:none;">
    <h3 id="name"></h3>
    <p>💰 الإجمالي: <span id="total"></span></p>
    <p>💵 المدفوع: <span id="paid"></span></p>
    <p>📉 المتبقي: <span id="remaining"></span></p>

    <a id="whatsappLink" target="_blank">
        <button class="whatsapp">📱 تواصل عبر واتساب</button>
    </a>

    <button class="logout" onclick="logout()">🚪 تسجيل خروج</button>
</div>

</div>

<script>
let members = [];
let currentUser = null;

// تحميل البيانات
async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();

    checkLogin();
}

loadData();

// تسجيل الدخول
function login() {
    const id = document.getElementById("id").value;
    const pass = document.getElementById("pass").value;

    const user = members.find(m =>
        m.membership_id == id && m.password == pass
    );

    if(user){
        currentUser = user;
        localStorage.setItem("user", JSON.stringify(user));
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ البيانات غير صحيحة";
    }
}

// عرض بيانات العضو فقط
function showUser(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("result").style.display = "block";

    document.getElementById("name").innerText = "👤 " + user.name;
    document.getElementById("total").innerText = user.total;
    document.getElementById("paid").innerText = user.paid;
    document.getElementById("remaining").innerText = user.remaining;

    // واتساب
    const phone = "963980049054";
    const message = "مرحبا، أنا العضو رقم " + user.membership_id + " (" + user.name + ")";
    document.getElementById("whatsappLink").href =
        "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);
}

// حفظ تسجيل الدخول
function checkLogin(){
    const saved = localStorage.getItem("user");
    if(saved){
        currentUser = JSON.parse(saved);
        showUser(currentUser);
    }
}

// تسجيل خروج
function logout(){
    localStorage.removeItem("user");
    location.reload();
}
</script>

</body>
</html>

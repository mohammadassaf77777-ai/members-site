<script>
const sheetID = "1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk";
const url = `https://opensheet.elk.sh/${sheetID}/Members`;

let data = [];

fetch(url)
  .then(res => res.json())
  .then(json => {
    data = json;
  });

function search(){
  let val = document.getElementById("id").value;
  let m = data.find(x => x.membership_id == val);

  if(m){
    document.getElementById("result").innerHTML =
    "الاسم: "+m.name+"<br>الإجمالي: "+m.total+
    "<br>المدفوع: "+m.paid+
    "<br>المتبقي: "+m.remaining;
  } else {
    document.getElementById("result").innerHTML = "لا يوجد";
  }
}
</script>

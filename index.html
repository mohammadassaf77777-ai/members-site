<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الأعضاء</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}

.container { margin-top: 40px; }

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 380px;
    margin: auto;
    margin-bottom: 15px;
}

button {
    width: 95%;
    padding: 12px;
    margin-top: 8px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

.groupBtn { background: #25D366; color: white; }
.login { background: #4CAF50; color: white; }
.logout { background: red; color: white; }
.whatsapp { background: #128C7E; color: white; }

input {
    width: 90%;
    padding: 12px;
    margin: 10px;
}
</style>
</head>

<body>

<div class="container">

<!-- 👥 مجموعات -->
<div class="card">
<h3>👥 مجموعات المشاريع</h3>

<button class="groupBtn" onclick="openWA('https://chat.whatsapp.com/DMYyaNAJjEUKBtyuCCmBzk')">
📌 المشروع السادس - الريادة الأول
</button>

<button class="groupBtn" onclick="openWA('https://chat.whatsapp.com/DFRRCjgDTLFF0HDOmniHFD')">
📌 المشروع الثامن - توسع المدينة W3
</button>

</div>

<!-- 🔐 تسجيل الدخول -->
<div id="loginBox" class="card">
<h3>🔐 تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="result"></div>

</div>

<script>

// 🔥 فتح واتساب بشكل مضمون داخل التطبيق
function openWA(url){
    window.open(url, "_blank");
}

// 📊 تحميل البيانات
let members = [];

async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// 🔐 تسجيل الدخول
function login() {
    const id = document.getElementById("id").value;
    const pass = document.getElementById("pass").value;

    const user = members.find(m =>
        m.membership_id == id && m.password == pass
    );

    if(user){
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ البيانات غير صحيحة";
    }
}

// 👤 عرض بيانات العضو
function showUser(user){
    document.getElementById("loginBox").style.display = "none";

    document.getElementById("result").innerHTML = `
    <div class="card">
        <h3>👤 ${user.name}</h3>

        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <button class="whatsapp" onclick="openWA('https://wa.me/963980049054')">
        📱 تواصل واتساب
        </button>

        <button class="logout" onclick="location.reload()">🚪 تسجيل الخروج</button>
    </div>
    `;
}

</script>

</body>
</html>

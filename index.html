<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الجمعية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Cairo',sans-serif; direction:rtl; text-align:center; background:#0d1f2d; color:white; min-height:100vh;}
#splash{position:fixed; inset:0; background:#0d1f2d; display:flex; align-items:center; justify-content:center; z-index:99999;}
.splash-content i{font-size:60px; color:#f0a500; margin-bottom:15px;}
.header{background:rgba(255,255,255,0.05); padding:20px; border-bottom:1px solid rgba(255,255,255,0.08);}
.header-title span{color:#f0a500;}
.tabs-container {display:flex; justify-content:center; gap:8px; width:92%; max-width:420px; margin:15px auto;}
.tab-btn {flex:1; padding:10px; font-size:12px; font-weight:700; border-radius:12px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:white; cursor:pointer;}
.tab-btn.active {background:#1a6b4a; border-color:transparent;}
.tab-content {display:none;}
.tab-content.active {display:block;}
.card{background:rgba(255,255,255,0.1); padding:20px; border-radius:24px; width:92%; max-width:420px; margin:15px auto; box-shadow:0 8px 32px rgba(0,0,0,0.25);}
input{width:100%; padding:12px; margin:8px 0; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:white; font-family:'Cairo';}
button{width:100%; padding:12px; margin:8px 0; border-radius:12px; border:none; font-family:'Cairo'; font-weight:700; cursor:pointer;}
.login{background:#1a6b4a; color:white;}
.logout{background:#c0392b; color:white;}
.user-stat{display:flex; justify-content:between; align-items:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:10px; margin:6px 0; font-size:14px;}
.stat-label{color:rgba(255,255,255,0.7); flex-grow:1; text-align:right;}
.stat-value{font-weight:700; text-align:left;}
.loading-spinner{display:inline-block; width:14px; height:14px; border:2px solid white; border-top-color:transparent; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:5px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-content">
    <i class="fa-solid fa-building-columns"></i>
    <h1>الجمعية التعاونية</h1>
    <p>جاري تحميل النظام...</p>
  </div>
</div>

<div class="header">
  <div class="header-title">الجمعية التعاونية الشعبية للسكن <span>بحلب</span></div>
</div>

<div id="mainPublicPage">
  <div class="card">
    <h3>🔐 تسجيل دخول الأعضاء</h3>
    <input id="id" placeholder="رقم العضوية" inputmode="numeric">
    <input id="pass" type="password" placeholder="كلمة السر">
    <button class="login" id="loginBtn" onclick="login()">دخول</button>
    <p id="error" style="color:#ff8f8f; font-size:13px; margin-top:8px;"></p>
  </div>
</div>

<div id="memberDashboard" style="display: none;">
  <div class="tabs-container">
    <button class="tab-btn active" onclick="switchTab('financialTab', this)">💰 الدفعات والوصل</button>
    <button class="tab-btn" onclick="switchTab('apartmentTab', this)">🏢 تفاصيل الشقة</button>
  </div>
  <div id="financialTab" class="tab-content active">
    <div class="card" id="content"></div>
  </div>
  <div id="apartmentTab" class="tab-content">
    <div class="card">
      <h3>🏢 تفاصيل الشقة</h3>
      <div class="user-stat"><span class="stat-label">🏗️ المشروع</span><span class="stat-value" id="aptProject">-</span></div>
      <div class="user-stat"><span class="stat-label">🪜 الطابق</span><span class="stat-value" id="aptFloor">-</span></div>
      <div class="user-stat"><span class="stat-label">🧭 الاتجاه</span><span class="stat-value" id="aptDirection">-</span></div>
      <div class="user-stat"><span class="stat-label">🚪 بيان التخصيص</span><span class="stat-value" id="aptRooms">-</span></div>
      <button class="logout" onclick="logout()">🚪 تسجيل الخروج</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycby7aZQ3aWrK3RXZluBqUsgnEXiCfa0SO7laUuRUKj2gtwwWAQY8mjxiuWiiMqqZu8RZzA/exec";

window.addEventListener("load", () => {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if(splash) splash.style.display = "none";
  }, 1000);
  
  let savedUser = localStorage.getItem("currentUser");
  if(savedUser) showUser(JSON.parse(savedUser));
});

function switchTab(tabId, element) {
  let contents = document.getElementsByClassName('tab-content');
  for (let i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  let buttons = document.getElementsByClassName('tab-btn');
  for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
  document.getElementById(tabId).classList.add('active');
  element.classList.add('active');
}

function login(){
  let id = document.getElementById("id").value.trim();
  let pass = document.getElementById("pass").value.trim();
  let errorEl = document.getElementById("error");
  let btn = document.getElementById("loginBtn");

  errorEl.innerText = "";
  if(!id || !pass){ errorEl.innerText = "⚠️ الرجاء إدخال البيانات"; return; }

  btn.disabled = true;
  btn.innerHTML = 'جاري التحقق... <span class="loading-spinner"></span>';

  fetch(API_URL + "?id=" + id + "&password=" + pass)
  .then(res => res.json())
  .then(data => {
    btn.disabled = false;
    btn.innerHTML = "دخول";
    if(data.status === "success"){
      let user = { membership_id: id, name: data.name, total: data.total, paid: data.paid, remaining: data.remaining, project: data.project, floor: data.floor, direction: data.direction, rooms: data.rooms };
      localStorage.setItem("currentUser", JSON.stringify(user));
      showUser(user);
    } else { errorEl.innerText = "❌ البيانات غير صحيحة"; }
  })
  .catch(() => {
    btn.disabled = false;
    btn.innerHTML = "دخول";
    errorEl.innerText = "⚠️ خطأ في الاتصال بالخادم";
  });
}

function showUser(user){
  document.getElementById("mainPublicPage").style.display = "none";
  document.getElementById("memberDashboard").style.display = "block";
  document.getElementById("aptProject").innerText = user.project;
  document.getElementById("aptFloor").innerText = user.floor;
  document.getElementById("aptDirection").innerText = user.direction;
  document.getElementById("aptRooms").innerText = user.rooms;

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3 style="color:#f0a500; margin-bottom:10px;">مرحباً بك</h3>
      <p style="margin-bottom:15px; font-weight:600;">${user.name}</p>
      <div class="user-stat"><span class="stat-label">💰 الإجمالي المطلوب</span><span class="stat-value">${user.total}</span></div>
      <div class="user-stat"><span class="stat-label">💵 المدفوع</span><span class="stat-value" style="color:#4effb0">${user.paid}</span></div>
      <div class="user-stat"><span class="stat-label">📉 المتبقي</span><span class="stat-value" style="color:#ff8f8f">${user.remaining}</span></div>
    </div>
  `;
}

function logout(){ localStorage.removeItem("currentUser"); location.reload(); }
</script>
</body>
</html>

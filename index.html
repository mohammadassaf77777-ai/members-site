<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل دخول الأعضاء</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      direction: rtl;
      text-align: center;
      font-family: Arial;
      height: 100vh;
    }

    .main-box {
      margin-top: 120px;
    }

    .card {
      border-radius: 20px;
      padding: 20px;
    }

    input {
      height: 50px;
      font-size: 18px;
    }

    button {
      height: 50px;
      font-size: 18px;
    }

    h2 {
      color: white;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

<div class="container main-box">

  <h2>🔐 تسجيل دخول العضو</h2>

  <div class="card shadow">

    <input type="number" id="id" class="form-control mb-3" placeholder="رقم العضوية">

    <input type="password" id="pass" class="form-control mb-3" placeholder="كلمة السر">

    <button class="btn btn-primary w-100" onclick="login()">دخول</button>

  </div>

  <div id="result" class="card shadow mt-4" style="display:none;">
    <h4 id="name"></h4>
    <p>💰 الإجمالي: <span id="total"></span></p>
    <p>💵 المدفوع: <span id="paid"></span></p>
    <p>📉 المتبقي: <span id="remaining"></span></p>
  </div>

  <div id="error" class="alert alert-danger mt-3" style="display:none;">
    ❌ رقم العضوية أو كلمة السر غير صحيحة
  </div>

</div>

<script>
async function login() {
  const id = document.getElementById("id").value;
  const pass = document.getElementById("pass").value;

  const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";

  const res = await fetch(url);
  const data = await res.json();

  const user = data.find(item => 
    item.membership_id == id && item.password == pass
  );

  if (user) {
    document.getElementById("result").style.display = "block";
    document.getElementById("error").style.display = "none";

    document.getElementById("name").innerText = "👤 " + user.name;
    document.getElementById("total").innerText = user.total;
    document.getElementById("paid").innerText = user.paid;
    document.getElementById("remaining").innerText = user.remaining;

  } else {
    document.getElementById("result").style.display = "none";
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>

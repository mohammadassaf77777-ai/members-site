<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الأعضاء</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    margin: auto;
    margin-top: 20px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 8px;
}

.admin { background: orange; color: white; }
.login { background: green; color: white; }
.logout { background: red; color: white; }
.whatsapp { background: #25D366; color: white; }

table {
    width: 100%;
    font-size: 12px;
}
</style>

</head>
<body>

<div class="card" id="loginBox">
<h3>🔐 تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error"></p>
</div>

<div id="content"></div>

<script>

let members = [];

async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// 🔐 تسجيل الدخول
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    // 👑 دخول الأدمن
    if(id == "9999" && pass == "admin123"){
        showAdmin();
        return;
    }

    let user = members.find(m => m.membership_id == id && m.password == pass);

    if(user){
        showUser(user);
    }else{
        document.getElementById("error").innerText = "❌ خطأ";
    }
}

// 👤 العضو
function showUser(user){
    document.getElementById("loginBox").style.display="none";

    document.getElementById("content").innerHTML = `
    <div class="card">
    <h3>${user.name}</h3>
    <p>الإجمالي: ${user.total}</p>
    <p>المدفوع: ${user.paid}</p>
    <p>المتبقي: ${user.remaining}</p>

    <button class="whatsapp" onclick="openWA('https://wa.me/963980049054')">واتساب</button>

    <button class="logout" onclick="location.reload()">خروج</button>
    </div>
    `;
}

// 👑 لوحة الأدمن
function showAdmin(){
    document.getElementById("loginBox").style.display="none";

    let html = `<div class="card">
    <h3>👑 لوحة التحكم</h3>
    <table border="1">
    <tr>
    <th>الاسم</th>
    <th>رقم</th>
    <th>إجمالي</th>
    <th>مدفوع</th>
    <th>متبقي</th>
    </tr>`;

    members.forEach(m=>{
        html += `
        <tr>
        <td>${m.name}</td>
        <td>${m.membership_id}</td>
        <td contenteditable>${m.total}</td>
        <td contenteditable>${m.paid}</td>
        <td contenteditable>${m.remaining}</td>
        </tr>
        `;
    });

    html += `</table>

    <button class="admin" onclick="alert('التعديل يتم من Google Sheet مباشرة')">
    حفظ التعديلات
    </button>

    <button class="logout" onclick="location.reload()">خروج</button>

    </div>`;

    document.getElementById("content").innerHTML = html;
}

// 📱 واتساب
function openWA(url){
    window.open(url, "_blank");
}

</script>

</body>
</html>

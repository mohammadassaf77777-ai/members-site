<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Members</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>Download Members PDF</h2>
<button onclick="generatePDF()">Download PDF</button>

<script>
function generatePDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont("Helvetica");
    doc.setFontSize(12);

    let y = 20;

    // بيانات (بدلها لاحقاً من Google Sheet)
    let members = [
        {id: 143, name: "Bassam Jawish", total: 5000000, paid: 2000000},
        {id: 200, name: "Mohammad Assaf", total: 2000000, paid: 500000}
    ];

    members.forEach(m => {

        let remaining = m.total - m.paid;

        let text =
            "Name: " + m.name +
            " | ID: " + m.id +
            " | Total: " + m.total +
            " | Paid: " + m.paid +
            " | Remaining: " + remaining;

        doc.text(text, 10, y);

        y += 10;
    });

    doc.save("members.pdf");
}
</script>

</body>
</html>

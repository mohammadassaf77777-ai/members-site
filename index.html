<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Members</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h2>تحميل كشف PDF</h2>
<button onclick="generatePDF()">تحميل PDF</button>

<script>
function generatePDF() {

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // تحويل النص العربي بشكل صحيح
    function fixArabic(text) {
        return text.split("").reverse().join("");
    }

    doc.setFont("Helvetica");
    doc.setFontSize(14);

    let y = 20;

    // بيانات تجريبية (بدلها من Google Sheet عندك)
    let members = [
        {id: 143, name: "بسام جاويش", total: 5000000, paid: 2000000},
        {id: 200, name: "محمد عساف", total: 2000000, paid: 500000}
    ];

    members.forEach(m => {

        let remaining = m.total - m.paid;

        let text =
            "الاسم: " + m.name +
            " | رقم: " + m.id +
            " | الإجمالي: " + m.total +
            " | المدفوع: " + m.paid +
            " | المتبقي: " + remaining;

        doc.text(fixArabic(text), 190, y, { align: "right" });

        y += 10;
    });

    doc.save("members.pdf");
}
</script>

</body>
</html>

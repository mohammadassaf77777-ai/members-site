<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الجمعية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141e30">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    margin:0;
}

.header {
    background: rgba(0,0,0,0.4);
    padding:15px;
    font-size:18px;
}

.fb-btn {
    display:inline-block;
    background:linear-gradient(45deg,#1877f2,#0d5ed7);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    margin-top:10px;
    text-decoration:none;
    font-weight:bold;
}

.card {
    background: white;
    color:black;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input, button {
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:none;
}

.login { background:#4CAF50; color:white; }
.logout { background:red; color:white; }
.admin { background:orange; color:white; }
.whatsapp { background:#25D366; color:white; }
.group { background:#128C7E; color:white; }

.alert {
    background:#4CAF50;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}
</style>

</head>
<body>

<div class="header">
الجمعية التعاونية الشعبية للسكن و الاصطياف بحلب
<br>
<a class="fb-btn" href="https://www.facebook.com/share/16asmQNh5u/" target="_blank">
📘 زيارة صفحة الفيسبوك
</a>
</div>

<div class="card">
<h3>👥 مجموعات المشاريع</h3>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DMYyaNAJjEUKBtyuCCmBzk')">
📌 المشروع السادس - الريادة الأول
</button>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DFRRCjgDTLFF0HDOmniHFD')">
📌 المشروع الثامن - توسع المدينة W3
</button>

</div>

<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="content"></div>

<script>

let members = [];
let lastUpdate = localStorage.getItem("lastUpdate") || "غير محدد";

// 🔗 رابط Google Script تبعك
const API_URL = "https://script.google.com/macros/s/AKfycbzF4wWLqDbJpANS1kVMir4MD3xXz1fBVEfJirb4zaeL6nT_cYFPHX9hZ9CtEUcvbXB5pQ/exec";

// 📊 تحميل البيانات
async function loadData(){
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// 🔐 تسجيل الدخول
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    if(id == "9999" && pass == "admin123"){
        updateDate();
        showAdmin(true);
        return;
    }

    let user = members.find(m => m.membership_id == id && m.password == pass);

    if(user){
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ بيانات خاطئة";
    }
}

// 👤 عرض العضو
function showUser(user){
    document.getElementById("loginBox").style.display="none";

    document.getElementById("content").innerHTML = `
    <div class="card">

        <div class="alert">🔔 تم تحديث البيانات مؤخراً</div>

        <h3>${user.name}</h3>

        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <p>📅 آخر تحديث: ${lastUpdate}</p>

        <hr>

        <h4>🔑 تغيير كلمة السر</h4>
        <input id="newPass" type="password" placeholder="كلمة السر الجديدة">
        <button class="admin" onclick="changePassword('${user.membership_id}')">حفظ</button>

        <p id="msg"></p>

        <button class="whatsapp" onclick="openWA()">
        للتواصل مع الجمعية اضغط هنا
        </button>

        <button class="logout" onclick="location.reload()">خروج</button>
    </div>
    `;
}

// 🔐 تغيير كلمة السر
function changePassword(userId){
    let newPass = document.getElementById("newPass").value;

    if(!newPass){
        document.getElementById("msg").innerText = "❌ اكتب كلمة السر";
        return;
    }

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            id: userId,
            password: newPass
        })
    })
    .then(res => res.text())
    .then(response => {
        if(response === "success"){
            document.getElementById("msg").innerText = "✅ تم تغيير كلمة السر";
        } else {
            document.getElementById("msg").innerText = "❌ فشل التغيير";
        }
    });
}

// 👑 الأدمن
function showAdmin(showAlert=false){
    document.getElementById("loginBox").style.display="none";

    let alertBox = showAlert ? `<div class="alert">🔔 تم تحديث التاريخ</div>` : "";

    let html = `<div class="card">
    ${alertBox}
    <h3>👑 لوحة التحكم</h3>

    <p>📅 آخر تحديث: ${lastUpdate}</p>

    <button class="admin" onclick="refreshData()">🔄 تحديث البيانات</button>

    <table border="1">
    <tr>
    <th>الاسم</th>
    <th>رقم</th>
    <th>إجمالي</th>
    <th>مدفوع</th>
    <th>متبقي</th>
    </tr>`;

    members.forEach(m=>{
        html += `
        <tr>
        <td>${m.name}</td>
        <td>${m.membership_id}</td>
        <td>${m.total}</td>
        <td>${m.paid}</td>
        <td>${m.remaining}</td>
        </tr>`;
    });

    html += `</table>

    <button class="logout" onclick="location.reload()">خروج</button>
    </div>`;

    document.getElementById("content").innerHTML = html;
}

// 📱 واتساب
function openWA(){
    window.open("https://wa.me/963980049054", "_blank");
}

// 🔗 روابط
function openLink(url){
    window.open(url, "_blank");
}

// 🔄 تحديث البيانات
function refreshData(){
    loadData();
    alert("تم تحديث البيانات 🔄");
}

// 📅 تحديث التاريخ
function updateDate(){
    let now = new Date().toLocaleString();
    localStorage.setItem("lastUpdate", now);
    lastUpdate = now;
}

</script>

</body>
</html>

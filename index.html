<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Members System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

button {
    padding: 10px;
    width: 95%;
    margin-top: 10px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 6px;
}

.member-card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h3>Login</h3>
    <input type="text" id="id" placeholder="Membership ID">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- SEARCH -->
<div class="container" id="searchBox" style="display:none;">
    <h3>Search Members</h3>
    <input type="text" id="search" placeholder="Search by name..." onkeyup="searchMember()">
</div>

<!-- RESULT -->
<div id="result"></div>

<script>

let members = [];

// 🔥 تحميل البيانات من Google Sheets مرة واحدة
async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}

loadData();

// LOGIN
function login() {
    let id = document.getElementById("id").value;
    let password = document.getElementById("password").value;

    let user = members.find(m =>
        m.membership_id == id && m.password == password
    );

    if(user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("searchBox").style.display = "block";
        showMembers(members);
    } else {
        document.getElementById("error").innerText = "Wrong ID or Password";
    }
}

// SEARCH
function searchMember() {
    let value = document.getElementById("search").value.toLowerCase();

    let filtered = members.filter(m =>
        m.name.toLowerCase().includes(value)
    );

    showMembers(filtered);
}

// SHOW MEMBERS
function showMembers(list) {
    let result = document.getElementById("result");
    result.innerHTML = "";

    list.forEach(m => {
        let remaining = m.total - m.paid;

        result.innerHTML += `
        <div class="member-card">
            <h3>${m.name}</h3>
            <p>ID: ${m.membership_id}</p>
            <p>Total: ${m.total}</p>
            <p>Paid: ${m.paid}</p>
            <p>Remaining: ${remaining}</p>
            <button onclick="downloadPDF('${m.membership_id}')">Download PDF</button>
        </div>
        `;
    });
}

// PDF لكل عضو
function downloadPDF(memberId) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let m = members.find(x => x.membership_id == memberId);
    let remaining = m.total - m.paid;

    doc.text("Member Info", 10, 10);
    doc.text("Name: " + m.name, 10, 20);
    doc.text("ID: " + m.membership_id, 10, 30);
    doc.text("Total: " + m.total, 10, 40);
    doc.text("Paid: " + m.paid, 10, 50);
    doc.text("Remaining: " + remaining, 10, 60);

    doc.save("member_" + m.membership_id + ".pdf");
}

</script>

</body>
</html>

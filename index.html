<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الجمعية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141e30">

<style>
/* 💥 شاشة تحميل */
.splash-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #141e30;
}

.splash-screen img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    animation: fadeInOut 3s ease-in-out;
}

@keyframes fadeInOut {
    0% {
        opacity: 0;
    }
    50% {
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
}

/* باقي التنسيق */
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    margin:0;
}

/* 🔝 الهيدر */
.header {
    background: rgba(0,0,0,0.4);
    padding:15px;
    font-size:18px;
}

/* 🔵 زر فيسبوك */
.fb-btn {
    display:inline-block;
    background:#1877f2;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    margin-top:10px;
    text-decoration:none;
    font-weight:bold;
}

/* 🧊 كرت */
.card {
    background: white;
    color:black;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* 🔘 أزرار */
input, button {
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:none;
}

.login { background:#4CAF50; color:white; }
.logout { background:red; color:white; }
.admin { background:orange; color:white; }
.whatsapp { background:#25D366; color:white; }
.group { background:#128C7E; color:white; }

/* 🔔 إشعار */
.alert {
    background:#4CAF50;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}
</style>

</head>
<body>

<!-- 🏠 الهيدر -->
<div class="header">
الجمعية التعاونية الشعبية للسكن و الاصطياف بحلب

<br>

<a class="fb-btn" href="https://www.facebook.com/share/16asmQNh5u/" target="_blank">
📘 زيارة صفحة الفيسبوك
</a>
</div>

<!-- 👥 مجموعات -->
<div class="card">
<h3>👥 مجموعات المشاريع</h3>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DMYyaNAJjEUKBtyuCCmBzk')">
📌 المشروع السادس - الريادة الأول
</button>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DFRRCjgDTLFF0HDOmniHFD')">
📌 المشروع الثامن - توسع المدينة W3
</button>

</div>

<!-- 🔐 تسجيل الدخول -->
<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="content"></div>

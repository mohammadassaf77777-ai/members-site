<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الجمعية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    margin:0;
}

.header {
    background: rgba(0,0,0,0.3);
    padding:15px;
    font-size:18px;
}

.header a {
    color: #00ffcc;
    display:block;
    margin-top:5px;
}

.card {
    background: white;
    color:black;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

input, button {
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:none;
}

.login { background:#4CAF50; color:white; }
.logout { background:red; color:white; }
.admin { background:orange; color:white; }
.whatsapp { background:#25D366; color:white; }

table {
    width:100%;
    font-size:12px;
}
</style>

</head>
<body>

<!-- 🏠 العنوان -->
<div class="header">
الجمعية التعاونية الشعبية للسكن و الاصطياف بحلب
<a href="https://www.facebook.com/share/16asmQNh5u/" target="_blank">
📘 صفحة الفيسبوك
</a>
</div>

<!-- 🔐 تسجيل الدخول -->
<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="content"></div>

<script>

let members = [];

// 📅 تاريخ آخر تحديث
let lastUpdate = localStorage.getItem("lastUpdate") || "غير محدد";

// 📊 تحميل البيانات
async function loadData(){
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// 🔐 تسجيل الدخول
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    // 👑 أدمن
    if(id == "9999" && pass == "admin123"){
        updateDate();
        showAdmin();
        return;
    }

    let user = members.find(m => m.membership_id == id && m.password == pass);

    if(user){
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ بيانات خاطئة";
    }
}

// 👤 عرض العضو
function showUser(user){
    document.getElementById("loginBox").style.display="none";

    document.getElementById("content").innerHTML = `
    <div class="card">
        <h3>${user.name}</h3>

        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <p>📅 آخر تحديث: ${lastUpdate}</p>

        <button class="whatsapp" onclick="openWA()">
        للتواصل مع الجمعية اضغط هنا
        </button>

        <button class="logout" onclick="location.reload()">خروج</button>
    </div>
    `;
}

// 👑 لوحة الأدمن
function showAdmin(){
    document.getElementById("loginBox").style.display="none";

    let html = `<div class="card">
    <h3>👑 لوحة التحكم</h3>
    <p>📅 آخر تحديث: ${lastUpdate}</p>

    <button class="admin" onclick="refreshData()">🔄 تحديث البيانات</button>

    <table border="1">
    <tr>
    <th>الاسم</th>
    <th>رقم</th>
    <th>إجمالي</th>
    <th>مدفوع</th>
    <th>متبقي</th>
    </tr>`;

    members.forEach(m=>{
        html += `
        <tr>
        <td>${m.name}</td>
        <td>${m.membership_id}</td>
        <td>${m.total}</td>
        <td>${m.paid}</td>
        <td>${m.remaining}</td>
        </tr>`;
    });

    html += `</table>

    <button class="logout" onclick="location.reload()">خروج</button>
    </div>`;

    document.getElementById("content").innerHTML = html;
}

// 📱 واتساب
function openWA(){
    window.open("https://wa.me/963980049054", "_blank");
}

// 🔄 تحديث البيانات
function refreshData(){
    loadData();
    alert("تم تحديث البيانات");
}

// 📅 تحديث التاريخ
function updateDate(){
    let now = new Date().toLocaleString();
    localStorage.setItem("lastUpdate", now);
    lastUpdate = now;
}

</script>

</body>
</html>

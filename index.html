<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الجمعية</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141e30">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    margin:0;
}
.header {
    background: rgba(0,0,0,0.4);
    padding:15px;
}
.fb-btn {
    display:inline-block;
    background:linear-gradient(45deg,#1877f2,#0d5ed7);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    margin-top:10px;
    text-decoration:none;
}
.card {
    background: white;
    color:black;
    padding:20px;
    border-radius:20px;
    width:90%;
    max-width:400px;
    margin:20px auto;
}
input, button {
    width:90%;
    padding:12px;
    margin:8px;
    border-radius:10px;
    border:none;
}
.login { background:#4CAF50; color:white; }
.logout { background:red; color:white; }
.admin { background:orange; color:white; }
.whatsapp { background:#25D366; color:white; }
.group { background:#128C7E; color:white; }
.alert {
    background:#4CAF50;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
.notify { background:#ff9800; color:white; }
</style>
</head>

<body>

<div class="header">
الجمعية التعاونية الشعبية للسكن و الاصطياف بحلب
<br>
<a class="fb-btn" href="https://www.facebook.com/share/16asmQNh5u/" target="_blank">
📘 زيارة صفحة الفيسبوك
</a>
</div>

<!-- 🔔 زر الإشعارات -->
<button class="notify" onclick="enableNotifications()">
🔔 تفعيل الإشعارات
</button>

<div class="card">
<h3>👥 مجموعات المشاريع</h3>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DMYyaNAJjEUKBtyuCCmBzk')">
📌 المشروع السادس
</button>

<button class="group" onclick="openLink('https://chat.whatsapp.com/DFRRCjgDTLFF0HDOmniHFD')">
📌 المشروع الثامن
</button>

</div>

<div class="card" id="loginBox">
<h3>تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="content"></div>

<!-- 🔔 Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyAqV1kUhJM2Y8UxtBX4uUc_QevWLdwKC_g",
  authDomain: "alchaiba.firebaseapp.com",
  projectId: "alchaiba",
  storageBucket: "alchaiba.firebasestorage.app",
  messagingSenderId: "586209422699",
  appId: "1:586209422699:web:cdcb2f2ffc48902e30302e"
};

const app = initializeApp(firebaseConfig);
const messaging = getMessaging(app);

// ✅ تسجيل Service Worker (الحل النهائي)
navigator.serviceWorker.register("./firebase-messaging-sw.js")
.then(() => console.log("Service Worker Registered"))
.catch(err => console.log("SW Error:", err));

// 🔔 تفعيل الإشعارات
window.enableNotifications = function(){
    Notification.requestPermission().then((permission) => {
        if (permission === "granted") {
            getToken(messaging, {
                vapidKey: "BERirHvZXQZ9invNBodU6-6rDgbH-2Q1sR8T5mBjzMOCPO2DtLOJvMJvohtqZCxF3-2pbI9tyj6hxHvMRpjPgpE"
            }).then((token) => {
                console.log("TOKEN:", token);
                alert("✅ تم التفعيل\nافتح Console وانسخ التوكن");
            });
        } else {
            alert("❌ لازم تسمح بالإشعارات");
        }
    });
};

// استقبال الإشعار
onMessage(messaging, (payload) => {
    alert("📩 إشعار جديد: " + payload.notification.title);
});
</script>

<script>
let lastUpdate = localStorage.getItem("lastUpdate") || "غير محدد";
const API_URL = "https://script.google.com/macros/s/AKfycbwPT3HpCK9ucjnkgGZJefJ-sTZSi4YaGeOVi26P_EB3ZjJorA-QVMf7LtvFCDlBirvYIQ/exec";

// تسجيل تلقائي
window.onload = function(){
    let savedUser = localStorage.getItem("currentUser");
    if(savedUser){
        showUser(JSON.parse(savedUser));
    }
};

// تسجيل الدخول
function login(){
    let id = document.getElementById("id").value;
    let pass = document.getElementById("pass").value;

    fetch(API_URL + "?id=" + id + "&password=" + pass)
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            let user = {
                membership_id: id,
                name: data.name,
                total: data.total,
                paid: data.paid,
                remaining: data.remaining
            };
            localStorage.setItem("currentUser", JSON.stringify(user));
            showUser(user);
        } else {
            document.getElementById("error").innerText = "❌ بيانات خاطئة";
        }
    });
}

// عرض المستخدم
function showUser(user){
    document.getElementById("loginBox").style.display="none";

    document.getElementById("content").innerHTML = `
    <div class="card">
        <div class="alert">🔔 أنت مسجل دخول</div>

        <h3>${user.name}</h3>
        <p>💰 ${user.total}</p>
        <p>💵 ${user.paid}</p>
        <p>📉 ${user.remaining}</p>

        <p>📅 آخر تحديث: ${lastUpdate}</p>

        <hr>

        <h4>🔑 تغيير كلمة السر</h4>
        <input id="newPass" type="password">
        <button class="admin" onclick="changePassword('${user.membership_id}')">حفظ</button>

        <p id="msg"></p>

        <button class="whatsapp" onclick="openWA()">📱 تواصل معنا</button>
        <button class="logout" onclick="logout()">خروج</button>
    </div>
    `;
}

// تغيير كلمة السر
function changePassword(userId){
    let newPass = document.getElementById("newPass").value;

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ id: userId, password: newPass })
    });
}

// واتساب
function openWA(){
    window.open("https://wa.me/963980049054", "_blank");
}

// خروج
function logout(){
    localStorage.removeItem("currentUser");
    location.reload();
}

// روابط
function openLink(url){
    window.open(url, "_blank");
}
</script>

</body>
</html>

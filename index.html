<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الأعضاء</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white;
}

.container { margin-top: 40px; }

.card {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 380px;
    margin: auto;
    margin-bottom: 15px;
}

/* أزرار المجموعات */
.groupBtn {
    background: #25D366;
    color: white;
    margin: 8px 0;
}

/* تسجيل الدخول */
input {
    width: 90%;
    padding: 12px;
    margin: 10px;
}

button {
    width: 95%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
}

.login { background: #4CAF50; color: white; }
.logout { background: red; color: white; }

</style>
</head>

<body>

<div class="container">

<!-- 👥 المجموعات -->
<div class="card">
<h3>👥 مجموعات المشاريع</h3>

<a target="_blank" href="https://chat.whatsapp.com/DMYyaNAJjEUKBtyuCCmBzk?mode=gi_t">
<button class="groupBtn">📌 المشروع السادس - الريادة الأول</button>
</a>

<a target="_blank" href="https://chat.whatsapp.com/DFRRCjgDTLFF0HDOmniHFD?mode=gi_t">
<button class="groupBtn">📌 المشروع الثامن - توسع المدينة W3</button>
</a>

</div>

<!-- 🔐 تسجيل الدخول -->
<div id="loginBox" class="card">
<h3>🔐 تسجيل الدخول</h3>

<input id="id" placeholder="رقم العضوية">
<input id="pass" type="password" placeholder="كلمة السر">

<button class="login" onclick="login()">دخول</button>
<p id="error" style="color:red;"></p>
</div>

<div id="result"></div>

</div>

<script>

let members = [];

// تحميل البيانات
async function loadData() {
    const url = "https://opensheet.elk.sh/1NZ-7RFkxg8WloP4oU0mNmxdsyOCI1v4k8IuBDbpErOk/Members";
    const res = await fetch(url);
    members = await res.json();
}
loadData();

// تسجيل الدخول
function login() {
    const id = document.getElementById("id").value;
    const pass = document.getElementById("pass").value;

    const user = members.find(m =>
        m.membership_id == id && m.password == pass
    );

    if(user){
        showUser(user);
    } else {
        document.getElementById("error").innerText = "❌ البيانات غير صحيحة";
    }
}

// عرض العضو
function showUser(user){
    document.getElementById("loginBox").style.display = "none";

    document.getElementById("result").innerHTML = `
    <div class="card">
        <h3>👤 ${user.name}</h3>

        <p>💰 الإجمالي: ${user.total}</p>
        <p>💵 المدفوع: ${user.paid}</p>
        <p>📉 المتبقي: ${user.remaining}</p>

        <button class="logout" onclick="location.reload()">🚪 خروج</button>
    </div>
    `;
}

</script>

</body>
</html>
